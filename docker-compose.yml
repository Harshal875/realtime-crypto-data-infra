services:

  # ── ZOOKEEPER ────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── KAFKA ────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── KAFKA UI ─────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── POSTGRES (TimescaleDB) ────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     market_user
      POSTGRES_PASSWORD: market_pass
      POSTGRES_DB:       market_data
    volumes:
      - ./services/analytics/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_user -d market_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ELASTICSEARCH ─────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── REDIS ─────────────────────────────────────────────────────────
  # Redis is an in-memory data store — everything lives in RAM, not disk.
  # Two uses in our system:
  #   1. Key-value cache: latest price per symbol (sub-millisecond reads)
  #   2. Pub/Sub: broadcast new prices to all subscribers in real time
  #      → GraphQL subscriptions (Week 6) will subscribe here
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── INGESTION SERVICE ─────────────────────────────────────────────
  # Connects to Binance WebSocket and publishes raw ticks to Kafka.
  ingestion:
    build: ./services/ingestion
    container_name: ingestion
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092

  # ── ORDER BOOK SERVICE ────────────────────────────────────────────
  # Consumes Kafka ticks, maintains in-memory order book, serves gRPC.
  order-book:
    build: ./services/order_book
    container_name: order-book
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "50051:50051"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092

  # ── ANALYTICS SERVICE ─────────────────────────────────────────────
  # Consumes Kafka → writes to Postgres (TimescaleDB) + Elasticsearch.
  analytics:
    build: ./services/analytics
    container_name: analytics
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      POSTGRES_DSN: postgresql://market_user:market_pass@postgres:5432/market_data
      ES_HOST: http://elasticsearch:9200

  # ── CACHE SERVICE ─────────────────────────────────────────────────
  # Consumes Kafka → stores latest price in Redis + broadcasts via Pub/Sub.
  cache:
    build: ./services/cache
    container_name: cache
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: "6379"

  # ── GRAPHQL GATEWAY ───────────────────────────────────────────────
  # FastAPI + Strawberry GraphQL: queries Redis, Postgres, Elasticsearch.
  graphql-gateway:
    build: ./services/graphql_gateway
    container_name: graphql-gateway
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DSN: postgresql://market_user:market_pass@postgres:5432/market_data
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ES_HOST: http://elasticsearch:9200

volumes:
  postgres_data:
  es_data:



